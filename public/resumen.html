<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Central de Filamentos · Resumen</title>
    <meta name="description" content="Tabla compacta de stock de filamentos por proveedor.">
    <link rel="stylesheet" href="styles.css">
    <script src="resumen.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand-lockup" href="index.html" aria-label="Central de Filamentos">
          <span class="brand-mark" aria-hidden="true">CF</span>
          <span class="brand-copy">
            <h1>Central de Filamentos</h1>
            <span id="summary-updated" class="brand-status">Actualizando...</span>
          </span>
        </a>
        <nav class="view-switch" aria-label="Cambiar vista">
          <a class="nav-link" href="index.html">Catálogo</a>
          <a class="nav-link active" href="resumen.html">Resumen</a>
          <a class="nav-link" href="#site-footer">Proveedores</a>
        </nav>
        <a id="summary-provider-count" class="provider-pill" href="#site-footer">Proveedores conectados</a>
      </header>

      <section class="filters one-line" aria-label="Buscar en resumen">
        <label class="search-field">
          <span>Buscar</span>
          <input id="summary-search" type="search" placeholder="negro, pla, grilon, 1kg">
        </label>
      </section>
      <section id="summary-quick-lines" class="quick-lines" aria-label="Líneas populares"></section>
      <p id="summary-line-help" class="line-help"></p>
      <section class="result-meta">
        <strong id="summary-count">0 filamentos</strong>
        <div class="category-sort" role="group" aria-label="Orden de categorías">
          <span>Orden</span>
          <button id="summary-sort-popular" class="soft-button active" type="button" data-category-order="popular">Popularidad</button>
          <button id="summary-sort-alpha" class="soft-button" type="button" data-category-order="alpha">A-Z</button>
        </div>
      </section>
      <section class="table-shell" aria-label="Resumen de stock">
        <div class="table-scroll">
          <table id="summary-table" class="summary-table"></table>
        </div>
      </section>
    </main>

    <footer id="site-footer" class="site-footer"></footer>
  </body>
</html>
