name: CI

on:
  push:
    paths-ignore:
      - "centraldefilamentos/data/**"
      - "public/data/**"
      - "public/assets/**"
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: python -m pytest -v

      - name: Build frontend
        run: npm run build
