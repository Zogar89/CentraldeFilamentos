name: UI audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "*.html"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.js"
      - "tests/e2e/**"

permissions:
  contents: read

jobs:
  playwright:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run test:ui
      - name: Upload UI audit evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-audit-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
