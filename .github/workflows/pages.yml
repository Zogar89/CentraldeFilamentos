name: Publish UI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/pages.yml"
      - "src/**"
      - "index.html"
      - "catalogo.html"
      - "resumen.html"
      - "color-picker.html"
      - "estadisticas.html"
      - "public/favicon.svg"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "svelte.config.js"

permissions:
  contents: write

concurrency:
  group: publish-ui
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish UI
    runs-on: ubuntu-latest
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: init.defaultBranch
      GIT_CONFIG_VALUE_0: master

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Publish dist to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pages_dir="$RUNNER_TEMP/gh-pages"
          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$repo_url" "$pages_dir"
          else
            git init "$pages_dir"
            git -C "$pages_dir" checkout -b gh-pages
            git -C "$pages_dir" remote add origin "$repo_url"
          fi
          find "$pages_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a dist/. "$pages_dir/"
          touch "$pages_dir/.nojekyll"
          git -C "$pages_dir" config user.name "github-actions[bot]"
          git -C "$pages_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$pages_dir" add -A
          if git -C "$pages_dir" diff --cached --quiet; then
            echo "No UI changes to publish"
            exit 0
          fi
          git -C "$pages_dir" commit -m "Publish UI"
          git -C "$pages_dir" push origin gh-pages
